name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'servers/**'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [main]
    paths:
      - 'servers/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: azure-resource-graph-mcp
            context: ./servers/azure-resource-graph-mcp
            title: "Azure Resource Graph MCP Server"
            description: "Read-only Azure inventory via Resource Graph + KQL over MCP."
          - name: microsoft-learn-search-mcp
            context: ./servers/microsoft-learn-search-mcp
            title: "Microsoft Learn Search MCP Server"
            description: "Self-hostable MCP server for searching Microsoft Learn docs and fetching articles as Markdown."
          - name: azure-openai-deployments-mcp
            context: ./servers/azure-openai-deployments-mcp
            title: "Azure OpenAI Deployments MCP Server"
            description: "FinOps-friendly MCP server listing Azure OpenAI accounts, deployments and quota usages."
          - name: github-models-mcp
            context: ./servers/github-models-mcp
            title: "GitHub Models MCP Server"
            description: "MCP server exposing the free-tier GitHub Models catalog and inference — routing, fallback and A/B compare."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=Pablo Piovano
            org.opencontainers.image.licenses=MIT

      - name: Build and push ${{ matrix.name }} (multi-arch)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true

      - name: Attest build provenance for ${{ matrix.name }}
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
